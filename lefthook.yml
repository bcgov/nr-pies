# Refer for explanation to following link: https://lefthook.dev/configuration/
assert_lefthook_installed: true
colors: false

commit-msg:
  commands:
    lint-commit:
      run: node_modules/.bin/commitlint --edit {1}

pre-commit:
  commands:
    format-source:
      glob: '*.{css,js,json,md,mdx,ts,tsx,yaml}'
      run: node_modules/.bin/prettier --check --write {staged_files}
      stage_fixed: true

pre-push:
  commands:
    lint-branch:
      run: node branch.helper.mts

    typecheck-source:
      run: node_modules/.bin/tsc --noEmit
